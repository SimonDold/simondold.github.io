---
# _layouts/post.html
layout: default
---

<div class="menu">
  <a href="/">Home</a>
</div>

<div class="news-post">
  <h1>{{ page.title }}</h1>
 
  <p class="post-meta">
    <small>{{ page.date | date: "%B %d, %Y" }}</small>
    {% if page.type %} • <small>{{ page.type | capitalize }}</small>{% endif %}
  </p>

  {{ content }}

  <hr style="margin: 3em 0 2em 0;">
  <p>
    ← <a href="/news/">Back to All News</a>
  </p>
</div>

<style>
  .menu {
    text-align: center;
    margin: 1.5em 0 2.5em 0;
    font-size: 0.95em;
  }
  
  .menu a {
    color: #0366d6;
    text-decoration: none;
  }
  
  .menu a:hover {
    text-decoration: underline;
  }

  .news-post {
    max-width: 780px;
    margin: 0 auto;
    padding: 0 20px;
  }
  
  .post-meta {
    color: #586069;
    margin-bottom: 2.5em;
  }
  
  .news-post h1 {
    margin-bottom: 0.3em;
  }
</style>
